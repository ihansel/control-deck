<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460">
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcff"/>
      <stop offset="1" stop-color="#e8eef8"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f7df3"/>
      <stop offset="1" stop-color="#715ee8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="720" height="460" rx="18" fill="url(#canvas)"/>
  <circle cx="90" cy="60" r="90" fill="#a9c9ff" opacity=".24" filter="url(#soft)"/>
  <circle cx="650" cy="395" r="115" fill="#b6a8ff" opacity=".22" filter="url(#soft)"/>

  <g transform="translate(38 34)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#11131a"/>
    <rect x="23" y="1" width="13" height="13" rx="2" fill="#11131a" transform="rotate(45 29.5 7.5)"/>
    <circle cx="52" cy="7" r="7" fill="#11131a"/>
    <text x="72" y="14" fill="#11131a" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing=".5">CONTROLDECK</text>
  </g>

  <text x="360" y="111" text-anchor="middle" fill="#11131a" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="29" font-weight="700">Install ControlDeck</text>
  <text x="360" y="140" text-anchor="middle" fill="#5e6675" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="15">Drag the app into Applications</text>

  <g transform="translate(285 226)">
    <path d="M0 18 H112" stroke="url(#arrow)" stroke-width="8" stroke-linecap="round"/>
    <path d="M99 4 L116 18 L99 32" fill="none" stroke="#715ee8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(222 367)">
    <rect width="276" height="40" rx="20" fill="#ffffff" opacity=".82"/>
    <circle cx="21" cy="20" r="10" fill="#dfff14"/>
    <path d="M17 20 l3 3 6-7" fill="none" stroke="#17200c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="42" y="25" fill="#384050" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">Then open it from Applications</text>
  </g>

  <text x="360" y="438" text-anchor="middle" fill="#7a8291" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="11">Universal for Apple silicon and Intel Macs</text>
</svg>
