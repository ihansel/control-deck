<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ControlDeck app icon</title>
  <desc id="desc">The square, triangle, cross and ChatGPT knot in a two-by-two grid on a rounded white macOS app tile.</desc>
  <defs>
    <clipPath id="tile">
      <rect x="64" y="64" width="896" height="896" rx="202"/>
    </clipPath>
  </defs>

  <g clip-path="url(#tile)">
    <rect x="64" y="64" width="896" height="896" fill="#FFFFFF"/>

    <rect x="224" y="224" width="230" height="230"
      fill="none"
      stroke="#0A0A0C"
      stroke-width="32"/>

    <path d="M685 218 L811 454 H559 Z"
      fill="none"
      stroke="#0A0A0C"
      stroke-width="32"
      stroke-linejoin="miter"/>

    <g fill="none" stroke="#0A0A0C" stroke-width="34" stroke-linecap="square">
      <path d="M250 574 L428 752"/>
      <path d="M428 574 L250 752"/>
    </g>

    <image href="../LogoConcepts/assets/chatgpt-logo-vector.svg"
      x="555" y="543" width="260" height="260"
      preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>
